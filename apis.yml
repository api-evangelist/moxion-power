aid: moxion-power
name: Moxion Power
description: >-
  Moxion Power was a Richmond, California-based mobile battery energy storage
  (BESS) company founded in 2020 that designed, manufactured, and deployed
  large-scale mobile lithium-iron-phosphate battery units (the MP-75 and
  related platforms) intended to displace diesel generators across construction
  sites, film and television production, live events, utility work, and
  emergency response. The company built a 40,000 square-foot factory in
  Richmond, raised approximately $100 million in a Series B at a reported
  $1.5 billion valuation led by Tamarack Global with participation from
  Amazon's Climate Pledge Fund and Microsoft's Climate Innovation Fund, and
  signed a multi-year fleet partnership with Sunbelt Rentals. After delivering
  400+ units it announced cessation of operations on July 29, 2024, laid off
  its entire workforce, and filed for Chapter 7 bankruptcy in the District of
  Delaware in August 2024 with approximately $201,980 in cash on hand and
  estimated liabilities of $100M–$500M. In September–October 2024, Viridi
  Parente acquired Moxion's Richmond facility, battery inventory,
  intellectual property, patents, and the Sunbelt Rentals relationship through
  the bankruptcy auction for approximately $7 million. Moxion Power had no
  public developer API, SDK, or open source release; its GitHub organization
  (github.com/moxion-power) contains zero public repositories. This profile is
  preserved for historical reference.
